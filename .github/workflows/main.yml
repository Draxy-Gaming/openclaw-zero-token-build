name: Build OpenClaw
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install -g pnpm

      - run: pnpm install

      - name: Patch broken tsconfig step
        run: |
          node -e "
            const fs = require('fs');
            const t = JSON.parse(fs.readFileSync('tsconfig.plugin-sdk.dts.json', 'utf8'));
            t.compilerOptions = t.compilerOptions || {};
            t.compilerOptions.noEmitOnError = false;
            fs.writeFileSync('tsconfig.plugin-sdk.dts.json', JSON.stringify(t, null, 2));
          "

      - run: pnpm build

      - run: pnpm ui:build

      - uses: actions/upload-artifact@v4
        with:
          name: openclaw-built
          path: |
            dist/
            openclaw.mjs
            package.json
          retention-days: 7
