name: Build OpenClaw
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install -g pnpm

      - run: pnpm install

      - run: pnpm build

      - run: pnpm ui:build

      - uses: actions/upload-artifact@v5
        with:
          name: openclaw-built
          path: |
            dist/
            ui/dist/
            openclaw.mjs
            package.json
            node_modules/
